server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Railway NestJS API (global prefix /api)
  location /api/ {
    proxy_pass https://sarh-app.up.railway.app/api/;
    proxy_ssl_server_name on;
    proxy_set_header Host sarh-app.up.railway.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location /uploads/ {
    proxy_pass https://sarh-app.up.railway.app/uploads/;
    proxy_ssl_server_name on;
    proxy_set_header Host sarh-app.up.railway.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 7d;
  }

  # Expo Router static export — SPA-style fallback
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|map)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
